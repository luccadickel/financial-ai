<div class="modal-overlay" (click)="closeModal.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2 class="modal-title">
        {{ transactionToEdit() ? 'Editar Transação' : 'Nova Transação' }}
      </h2>
      <button class="btn-close" (click)="closeModal.emit()">&times;</button>
    </div>

    <app-form 
      [formGroup]="transactionForm" 
      [submitText]="transactionToEdit() ? 'Salvar Alterações' : 'Salvar Transação'"
      formClass="modal-form-layout"
      (submitEvent)="onSubmit()">
      
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" formControlName="description" placeholder="Ex: Compras Mensais">
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>Valor (R$)</label>
          <input type="number" step="0.01" formControlName="amount" placeholder="0.00">
        </div>
        <div class="form-group half">
          <label>Data</label>
          <input type="date" formControlName="transactionDate">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>Tipo</label>
          <select formControlName="transactionType">
            <option [value]="transactionTypes.EXPENSE">Despesa</option>
            <option [value]="transactionTypes.INCOME">Receita</option>
          </select>
        </div>
        
        <div class="form-group half">
          <label>Categoria</label>
          <select formControlName="categoryId">
            <option [ngValue]="null" disabled>Selecione uma categoria...</option>
            @for (category of categories(); track category.id) {
              <option [ngValue]="category.id">{{ category.name }}</option>
            }
          </select>
        </div>
      </div>

      <button type="button" class="btn-secondary" (click)="closeModal.emit()">Cancelar</button>
    
    </app-form>
  </div>
</div>
